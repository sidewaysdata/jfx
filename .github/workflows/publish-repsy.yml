name: Publish to Repsy

# Publishes every master commit (and every tag push) to repsy as
# org.openjfx:javafx-*:27.0.0-sd.<short-sha> with classifiers linux, mac,
# mac-aarch64, and win. Mac/Windows native libs cannot be cross-compiled, so
# each platform runs on its own GHA runner.

on:
  push:
    branches: [master]
    tags: ['**']
  workflow_dispatch:

concurrency:
  group: publish-repsy-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runs-on: ubuntu-24.04
            platform: linux
            classifier: linux
            boot_jdk_file: jdk-25.0.1_linux-x64_bin.tar.gz
            boot_jdk_url: https://download.oracle.com/java/25/archive/jdk-25.0.1_linux-x64_bin.tar.gz
          - name: mac
            runs-on: macos-15-intel
            platform: mac
            classifier: mac
            xcode: /Applications/Xcode_16.0.app/Contents/Developer
            boot_jdk_file: jdk-25.0.1_macos-x64_bin.tar.gz
            boot_jdk_url: https://download.oracle.com/java/25/archive/jdk-25.0.1_macos-x64_bin.tar.gz
          - name: mac-aarch64
            runs-on: macos-14
            platform: mac
            classifier: mac-aarch64
            xcode: /Applications/Xcode_15.4.app/Contents/Developer
            boot_jdk_file: jdk-25.0.1_macos-aarch64_bin.tar.gz
            boot_jdk_url: https://download.oracle.com/java/25/archive/jdk-25.0.1_macos-aarch64_bin.tar.gz
          - name: win
            runs-on: windows-2022
            platform: win
            classifier: win
            boot_jdk_file: jdk-25.0.1_windows-x64_bin.zip
            boot_jdk_url: https://download.oracle.com/java/25/archive/jdk-25.0.1_windows-x64_bin.zip

    name: Publish ${{ matrix.classifier }}
    runs-on: ${{ matrix.runs-on }}

    env:
      BOOT_JDK_VERSION: "25.0.1"
      BOOT_JDK_FILENAME: ${{ matrix.boot_jdk_file }}
      BOOT_JDK_URL: ${{ matrix.boot_jdk_url }}
      REPSY_USERNAME: ${{ secrets.REPSY_USERNAME }}
      REPSY_PASSWORD: ${{ secrets.REPSY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # --- Linux ---------------------------------------------------------
      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          set -x
          sudo apt-get update
          sudo apt-get install -y \
            ant pkg-config \
            libgl1-mesa-dev libx11-dev libxxf86vm-dev libxt-dev libxtst-dev \
            libgtk2.0-dev libgtk-3-dev \
            libglib2.0-dev libasound2-dev libpango1.0-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      - name: Download boot JDK (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -x
          mkdir -p "${HOME}/bootjdk"
          wget -O "${HOME}/bootjdk/${BOOT_JDK_FILENAME}" "${BOOT_JDK_URL}"
          tar -xf "${HOME}/bootjdk/${BOOT_JDK_FILENAME}" -C "${HOME}/bootjdk"

      - name: Setup Linux environment
        if: matrix.name == 'linux'
        run: |
          set -x
          JAVA_HOME="${HOME}/bootjdk/jdk-${BOOT_JDK_VERSION}"
          echo "JAVA_HOME=${JAVA_HOME}" >> "${GITHUB_ENV}"
          echo "${JAVA_HOME}/bin" >> "${GITHUB_PATH}"

      # --- macOS (both arches) ------------------------------------------
      - name: Setup macOS environment
        if: runner.os == 'macOS'
        run: |
          set -x
          sudo xcode-select --switch "${{ matrix.xcode }}"
          xcodebuild -version
          JAVA_HOME="${HOME}/bootjdk/jdk-${BOOT_JDK_VERSION}.jdk/Contents/Home"
          echo "JAVA_HOME=${JAVA_HOME}" >> "${GITHUB_ENV}"
          echo "${JAVA_HOME}/bin" >> "${GITHUB_PATH}"

      # --- Windows ------------------------------------------------------
      - name: Restore cygwin packages cache (Windows)
        if: matrix.name == 'win'
        uses: actions/cache@v5
        with:
          path: ~/cygwin/packages
          key: cygwin-packages-${{ runner.os }}-v1

      - name: Install cygwin (Windows)
        if: matrix.name == 'win'
        run: |
          New-Item -Force -ItemType directory -Path "$HOME\cygwin"
          & curl -L "https://www.cygwin.com/setup-x86_64.exe" -o "$HOME/cygwin/setup-x86_64.exe"
          Start-Process -FilePath "$HOME\cygwin\setup-x86_64.exe" -ArgumentList "--quiet-mode --packages make,zip,unzip --root $HOME\cygwin\cygwin64 --local-package-dir $HOME\cygwin\packages --site http://mirrors.kernel.org/sourceware/cygwin --no-desktop --no-shortcuts --no-startmenu --no-admin" -Wait -NoNewWindow
          # Remove cygwin's coreutils `link.exe` so MSVC's link.exe wins in
          # make's PATH search. Without this, :media:buildWinGlib fails with
          # "link: unknown option -- o" during the final DLL link step.
          $cygLink = "$HOME\cygwin\cygwin64\usr\bin\link.exe"
          if (Test-Path $cygLink) { Remove-Item -Force $cygLink }

      - name: Install ant (Windows)
        if: matrix.name == 'win'
        env:
          ANT_URL: https://archive.apache.org/dist/ant/binaries/apache-ant-1.10.5-bin.tar.gz
          ANT_FILENAME: apache-ant-1.10.5.tar.gz
        run: |
          mkdir -p "$HOME\build-tools"
          & curl -L "$env:ANT_URL" -o "$HOME/build-tools/$env:ANT_FILENAME"
          tar -zxf "$HOME/build-tools/$env:ANT_FILENAME" -C "$HOME/build-tools"

      - name: Download boot JDK (Windows)
        if: matrix.name == 'win'
        run: |
          mkdir -p "$HOME\bootjdk"
          & curl -L "$env:BOOT_JDK_URL" -o "$HOME/bootjdk/$env:BOOT_JDK_FILENAME"
          tar -xf "$HOME/bootjdk/$env:BOOT_JDK_FILENAME" -C "$HOME/bootjdk"

      - name: Setup Windows environment
        if: matrix.name == 'win'
        env:
          ANT_DIR: apache-ant-1.10.5
        run: |
          $env:JAVA_HOME = "$HOME\bootjdk\jdk-$env:BOOT_JDK_VERSION"
          $env:ANT_HOME = "$HOME\build-tools\$env:ANT_DIR"
          $env:Path = "$HOME\cygwin\cygwin64\bin;$env:JAVA_HOME\bin;$env:ANT_HOME\bin;$env:Path"
          echo "JAVA_HOME=$env:JAVA_HOME" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "ANT_HOME=$env:ANT_HOME"   | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "$HOME\cygwin\cygwin64\bin"  | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "$env:JAVA_HOME\bin"         | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "$env:ANT_HOME\bin"          | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          java -version
          ant -version

      # --- Windows: set up MSVC env so cl.exe is on PATH for media build ---
      - name: Set up MSVC environment (Windows)
        if: matrix.name == 'win'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # --- Publish ------------------------------------------------------
      - name: Verify toolchain and repsy secrets (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -x
          java -version
          python3 --version
          git rev-parse --short=7 HEAD
          # Fail fast if secrets are missing. Print only lengths; never values.
          [ -n "${REPSY_USERNAME}" ] || { echo "REPSY_USERNAME is empty or unset"; exit 1; }
          [ -n "${REPSY_PASSWORD}" ] || { echo "REPSY_PASSWORD is empty or unset"; exit 1; }
          echo "REPSY_USERNAME length: ${#REPSY_USERNAME}"
          echo "REPSY_PASSWORD length: ${#REPSY_PASSWORD}"

      - name: Verify toolchain and repsy secrets (Windows)
        if: matrix.name == 'win'
        run: |
          java -version
          python --version
          git rev-parse --short=7 HEAD
          where cl.exe
          if ([string]::IsNullOrEmpty($env:REPSY_USERNAME)) { Write-Error "REPSY_USERNAME is empty or unset"; exit 1 }
          if ([string]::IsNullOrEmpty($env:REPSY_PASSWORD)) { Write-Error "REPSY_PASSWORD is empty or unset"; exit 1 }
          Write-Host "REPSY_USERNAME length: $($env:REPSY_USERNAME.Length)"
          Write-Host "REPSY_PASSWORD length: $($env:REPSY_PASSWORD.Length)"

      - name: Publish (Linux/macOS)
        if: runner.os != 'Windows'
        run: python3 publish.py --platform ${{ matrix.platform }} --classifier ${{ matrix.classifier }}

      - name: Publish (Windows)
        if: matrix.name == 'win'
        run: python publish.py --platform ${{ matrix.platform }} --classifier ${{ matrix.classifier }}
